<!DOCTYPE html>
<html>
<head>
    <title>My Surprise For You 🎁</title>
    <style>
        body {
            background: linear-gradient(to right, #ff4e73, #ff758c);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        h1 {
            font-size: 45px;
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 22px;
            margin-top: 20px;
            animation: fadeIn 3s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .heart {
            font-size: 50px;
            margin-top: 30px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% {transform: scale(1);}
            50% {transform: scale(1.2);}
            100% {transform: scale(1);}
        }
    </style>
</head>
<body>

    <h1>Rihab ❤️</h1>
    <p>Kanbghik w ma n9darsh n3ich bla bik 💕</p>
    <p>Ntمنى nكون ديما sabab f da7ktk 😍</p>

    <div class="heart">❤️</div>

</body>
</html>
