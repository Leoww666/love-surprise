<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>For Rihab ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff4e50, #ff9a9e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    .box {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
    }

    p {
      font-size: 22px;
      margin-top: 20px;
    }

    .heart {
      font-size: 60px;
      margin-top: 20px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Rihab ❤️</h1>
    <p>Had surprise ghir 3lik nti 💕</p>
    <p>Kanbghik bzaf w ma n9darsh n3ich bla bik 😘</p>
    <div class="heart">❤️</div>
  </div>
</body>
</html>
